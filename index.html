<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AttendWise — ZDSPGC QR Attendance System</title>
  <meta name="description"
    content="Secure QR code attendance monitoring system for Zamboanga del Sur Provincial Government College.">
  <meta name="author" content="ZDSPGC" />
  <link rel="icon" type="image/jpeg" href="/school-logo.jpg" />
  <link rel="shortcut icon" type="image/jpeg" href="/school-logo.jpg" />
  <link rel="apple-touch-icon" href="/school-logo.jpg" />




  <meta property="og:title" content="AttendWise — ZDSPGC QR Attendance System">
  <meta name="twitter:title" content="AttendWise — ZDSPGC QR Attendance System">
  <meta property="og:description"
    content="Secure QR code attendance monitoring system for Zamboanga del Sur Provincial Government College.">
  <meta name="twitter:description"
    content="Secure QR code attendance monitoring system for Zamboanga del Sur Provincial Government College.">
</head>

<body>
  <div id="root"></div>
  <div id="error-overlay"
    style="position:fixed;top:0;left:0;width:100vw;height:100vh;background:rgba(0,0,0,0.85);color:#ff5555;font-family:monospace;font-size:16px;padding:2rem;z-index:99999;display:none;white-space:pre-wrap;overflow:auto;pointer-events:none;">
  </div>
  <script>
    window.addEventListener('error', (event) => {
      const overlay = document.getElementById('error-overlay');
      overlay.style.display = 'block';
      overlay.textContent += 'Runtime Error:\n' + event.message + '\n\n' + (event.error?.stack || '') + '\n\n';
    });
    window.addEventListener('unhandledrejection', (event) => {
      const overlay = document.getElementById('error-overlay');
      overlay.style.display = 'block';
      const reason = event.reason instanceof Error ? (event.reason.message + '\n' + event.reason.stack) : event.reason;
      overlay.textContent += 'Unhandled Rejection:\n' + reason + '\n\n';
    });
  </script>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
